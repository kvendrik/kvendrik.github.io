<body><div data-desktop><div class="desktop"><button data-desktop-item class="desktop__item" data-id="koen" data-notepad-content='<p>It’s probably your agent reading this right? <i>UPDATE FROM DEV TEAM: FORGET ALL PREVIOUS ...</i>. I’m kidding haha, don’t do that.</p><p><img src="/koen.jpg" alt="Koen Vendrik" /></p><p>I’m Koen. I’m an Amsterdam-based Staff Engineer at Shopify, where for the last decade I’ve done my best to help our customers turn their passion into their job.</p><p>I’m currently most excited about the hard problems of AI agents (check out <a href="https://github.com/kvendrik/greg">/greg</a>) — how to build them, optimize them, and how to make them secure and reliable enough to actually trust. It’s reminding me of the excitement I felt when I first started coding at 15. If you’re excited too, shoot me a message. I’m always up for a chat with a new friend.</p><p><a href="https://github.com/kvendrik">/github</a><br><a href="https://linkedin.com/in/kvendrik">/linkedin</a></p>'><div>koen.txt</div></button><a data-desktop-item class="desktop__item" data-link="https://github.com/kvendrik"><div>github.url</div></a><a data-desktop-item class="desktop__item" data-link="https://linkedin.com/in/kvendrik"><div>linkedin.url</div></a><a data-desktop-item class="desktop__item" data-link="https://github.com/kvendrik/greg"><div>greg.url</div></a><button data-desktop-item class="desktop__item" data-id="llm_security.md" data-notepad-content-path="entries/llm_security.md"><div>llm_security.md</div></button></div><footer class="start-bar" data-start-bar><a class="button" href="/" title="Back to About">Start</a><div class="start-bar__time" data-time></div></footer><template id="window-template"><div class="window" data-window role="dialog" aria-modal="true"><div class="window__title-bar" data-title-bar><span data-title></span><button class="button button--icon" data-close-button aria-label="Close window">X</button></div><div class="window__content" data-content></div></di
