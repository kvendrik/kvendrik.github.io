<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />

    <title>{{title}}</title>

    <meta name="description" content="{{description}}" />
    <meta name="author" content="Koen Vendrik" />
    <meta name="follow" content="index, follow" />

    <meta property="og:site_name" content="{{title}}" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:image" content="{{image}}" />

    <meta property="fb:app_id" content="1558942351039907" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@kvendrik" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{description}}" />
    <meta name="twitter:image" content="{{image}}" />

    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="manifest" href="/favicons/site.webmanifest" />
    <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#ffffff" />
    <link rel="shortcut icon" href="/favicons/favicon.ico" />
    <meta name="msapplication-TileColor" content="#efd352" />
    <meta name="msapplication-config" content="/favicons/browserconfig.xml" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="preload" href="/scripts/retro-ui/index.mjs" as="script" crossorigin />
    <link rel="preload" href="/scripts/retro-ui/retro-ui.mjs" as="script" crossorigin />
    <link rel="preload" href="/scripts/retro-ui/windows-manager.mjs" as="script" crossorigin />
    <link rel="preload" href="/fonts/w95fa.woff2" as="font" type="font/woff2" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://esm.sh/highlight.js/styles/vs.css" />
    <link rel="stylesheet" href="/main.css?{unix}" />

    <script defer>
      (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r;
        ((i[r] =
          i[r] ||
          function () {
            (i[r].q = i[r].q || []).push(arguments);
          }),
          (i[r].l = 1 * new Date()));
        ((a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]));
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m);
      })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

      ga('create', 'UA-62916044-1', 'auto');
      ga('send', 'pageview');
    </script>
  </head>
  <body>
    <div data-desktop>
      {window}

      <div class="desktop">
        {bio}
        <a data-desktop-item class="desktop__item" data-link="https://github.com/kvendrik">
          <div>github.url</div>
        </a>
        <a data-desktop-item class="desktop__item" data-link="https://linkedin.com/in/kvendrik">
          <div>linkedin.url</div>
        </a>
        <a data-desktop-item class="desktop__item" data-link="https://github.com/kvendrik/greg">
          <div>greg.url</div>
        </a>
        {articles}
      </div>

      <footer class="start-bar" data-start-bar>
        <div class="start-bar__group">
          <a class="button" href="/" title="Back to About">Start</a>
          <div data-window-controls></div>
        </div>
        <div class="start-bar__time" data-time></div>
      </footer>

      <template id="window-template">
        <div class="window" data-window role="dialog" aria-modal="true">
          <div class="window__title-bar" data-title-bar>
            <span data-title></span>
            <button class="button button--icon" data-close-button aria-label="Close window">
              X
            </button>
          </div>
          <div class="window__content" data-content></div>
        </div>
      </template>
    </div>

    <div hidden>
      <span id="external-link-message">Opens an external site in a new window</span>
    </div>

    <script type="module" src="/scripts/main.mjs?{unix}"></script>
  </body>
</html>
